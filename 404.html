<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro 404 | Augustuna</title>
  
  <meta name="description" content="Página não encontrada.">
  <link rel="icon" type="image/x-icon" href="Logo oficial 2.png">

  <!-- Core Styles -->
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 100% 100%, #1B3A5C 0%, #060E1A 100%);
      color: var(--branco-perola);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      font-family: var(--font-body);
    }

    .error-container {
      max-width: 600px;
      padding: 2rem;
      animation: fadeIn 1s ease-out forwards;
    }

    .error-image {
      width: 100%;
      max-width: 250px;
      height: auto;
      margin: 0 auto 2rem auto;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
    }

    .error-title {
      font-family: var(--font-display);
      font-size: 5rem;
      color: var(--dourado);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
      margin-bottom: 0.5rem;
      margin-top: 0;
    }

    .error-subtitle {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: var(--branco-perola);
    }
  </style>
</head>
<body>

  <div class="error-container">
    <h1 class="error-title">404</h1>
    <h2 class="error-subtitle">Parece que te perdeste no ensaio...</h2>

    <div style="margin: 2rem 0;">
      <a href="index.html" class="btn btn-primary" style="display: inline-flex; justify-content: center; padding: 1rem 2.5rem; font-size: 1.1rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="m15 18-6-6 6-6"/></svg>
        Voltar à Página Inicial
      </a>
    </div>

    <img src="seminoide.png" alt="Erro 404" class="error-image" id="imagem-404" style="margin-top: 2rem;">
  </div>

</body>
</html>
