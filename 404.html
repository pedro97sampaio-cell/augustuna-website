<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro 404 - Farricoco Runner | Augustuna</title>
    <link rel="icon" type="image/x-icon" href="Logo oficial 2.png">
    <style>
        body {
            margin: 0;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #535353;
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #535353;
            border: 2px solid #535353;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 1000;
        }
        .btn-back:hover {
            background-color: #535353;
            color: #f7f7f7;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 250px;
            background-color: #f7f7f7;
            overflow: hidden;
            user-select: none;
        }

        /* CHÃO COM TEXTURA PIXEL */
        #ground {
            position: absolute;
            bottom: 20px;
            width: 200%;
            height: 2px;
            background-color: #535353;
            z-index: 3;
        }
        .ground-detail {
            position: absolute;
            background-color: #535353;
            height: 1px;
            width: 4px;
            bottom: 15px;
            opacity: 0.5;
        }

        /* NUVENS MINIMALISTAS */
        .cloud {
            position: absolute;
            background: #d3d3d3;
            height: 12px;
            width: 40px;
            border-radius: 6px;
            z-index: 1;
            opacity: 0.6;
        }

        /* FARRICOCO GHOST (SNAPCHAT STYLE + ROPE) */
        #player {
            position: absolute;
            bottom: 22px;
            left: 50px;
            width: 36px;
            height: 50px;
            z-index: 10;
        }
        .hood {
            width: 100%;
            height: 100%;
            background: #111; /* Preto */
            border-radius: 18px 18px 0 0; /* Cabeça redonda tipo Snapchat */
            position: relative;
            /* Recorte ondulado na base (fantasma) */
            clip-path: polygon(
                0% 0%, 100% 0%, 100% 85%, 
                87.5% 100%, 75% 85%, 62.5% 100%, 50% 85%, 
                37.5% 100%, 25% 85%, 12.5% 100%, 0% 85%
            );
        }
        .rope {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #A0522D; /* Castanho corda */
            z-index: 12;
        }
        .rope-knot {
            position: absolute;
            top: 13px;
            right: -2px;
            width: 7px;
            height: 7px;
            background: #8B4513;
            border-radius: 50%;
            z-index: 12;
        }
        .rope-tail {
            position: absolute;
            top: 18px;
            right: -4px;
            width: 3px;
            height: 10px;
            background: #A0522D;
            transform: rotate(20deg);
            z-index: 11;
        }
        .face {
            position: absolute;
            top: 22px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .eyes { display: flex; gap: 4px; }
        .eye { width: 6px; height: 8px; background: white; border-radius: 50%; }
        .blush { display: flex; gap: 14px; margin-top: -1px; }
        .dot { width: 5px; height: 3px; background: #999; border-radius: 50%; }

        /* GARRAFA DE CERVEJA (OBSTÁCULO) */
        .bottle {
            position: absolute;
            bottom: 22px;
            width: 12px;
            height: 35px;
            z-index: 5;
        }
        .b-body {
            position: absolute;
            bottom: 0;
            width: 12px;
            height: 22px;
            background: #535353;
            border-radius: 2px 2px 0 0;
        }
        .b-neck {
            position: absolute;
            bottom: 22px;
            left: 4px;
            width: 4px;
            height: 13px;
            background: #535353;
        }

        /* UI */
        #score {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .instructions {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        button {
            background: none;
            border: 2px solid #535353;
            color: #535353;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background: #535353;
            color: #f7f7f7;
        }
        
        @media (max-width: 600px) {
            #game-container {
                height: 300px;
            }
            .instructions {
                font-size: 12px;
                padding: 0 20px;
            }
        }

        /* LOADING SCREEN */
        #game-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        .loader-ghost {
            width: 36px;
            height: 50px;
            background: #111;
            border-radius: 18px 18px 0 0;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 87.5% 100%, 75% 85%, 62.5% 100%, 50% 85%, 37.5% 100%, 25% 85%, 12.5% 100%, 0% 85%);
            animation: float 1s infinite alternate ease-in-out;
            margin-bottom: 20px;
            position: relative;
        }
        /* Loader ghost face */
        .loader-ghost::before {
            content: ''; position: absolute; top: 22px; left: 13px; width: 4px; height: 6px; background: white; border-radius: 50%; box-shadow: 6px 0 0 white;
        }
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">&larr; Voltar ao Ritmo</a>

    <div id="game-loader">
        <div class="loader-ghost"></div>
        <h2 style="margin:0; letter-spacing: 2px;">A AFINAR INSTRUMENTOS...</h2>
    </div>

    <div id="game-container">
        <div id="score">00000</div>
        <div id="ground"></div>
        <div id="player">
            <div class="hood"></div>
            <div class="rope"></div>
            <div class="rope-knot"></div>
            <div class="rope-tail"></div>
            <div class="face">
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="blush"><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>
        <div id="game-over">
            <h1 style="letter-spacing: 5px; margin-bottom: 5px;">G A M E  O V E R</h1>
            
            <div id="highscore-input" style="display: none; margin: 15px 0;">
                <p style="margin: 0 0 5px 0; color: #C9A84C; font-weight: bold;">NOVO RECORDE!</p>
                <input type="text" id="playerName" placeholder="O teu nome..." maxlength="10" style="padding: 5px; text-align: center; border: 2px solid #535353; font-family: inherit; width: 150px;">
                <br>
                <button onclick="saveHighscore()">GUARDAR</button>
            </div>

            <div id="highscore-table" style="margin: 15px 0; text-align: left; font-size: 14px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 5px;">
                <h3 style="margin: 0 0 10px 0; text-align: center;">TOP 5 FARRICOCOS</h3>
                <ol id="highscore-list" style="margin: 0; padding-left: 20px;">
                    <!-- Preenchido via JS -->
                </ol>
            </div>

            <button id="btn-restart" onclick="restart()">REINICIAR ENSAIO</button>
        </div>
    </div>
    
    <div class="instructions">
        Pressiona <strong>ESPAÇO</strong> ou <strong>TOCA NO ECRÃ</strong> para saltar.<br>
        Ajuda o Farricoco a saltar os finos!
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over');
    const ground = document.getElementById('ground');

    let state = {
        gameOver: false,
        score: 0,
        speed: 4.5, /* Começa mais lento (antes era 6) */
        gravity: 0.6,
        jumpPower: -12,
        velocityY: 0,
        isJumping: false,
        obstacles: [],
        spawnTimer: 0
    };

    let highscores = [];
    const BIN_URL = "https://jsonblob.com/api/jsonBlob/019d2cc6-daf7-7df0-9801-03e71948ba95";

    async function initGame() {
        // Carregar recordes
        // Min order of 1.5s for the loading screen animation
        const [res] = await Promise.all([
            fetch(BIN_URL).catch(()=>null),
            new Promise(r => setTimeout(r, 1500))
        ]);

        if(res && res.ok) {
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        }

        // Esconder loader
        const loader = document.getElementById('game-loader');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
            // Iniciar o jogo
            requestAnimationFrame(update);
        }, 500);
    }

    // Arrancar a inicialização
    initGame();

    function checkHighscore(finalScore) {
        let scoreInt = Math.floor(finalScore);
        if (scoreInt <= 0) return false;
        if (highscores.length < 5) return true;
        return scoreInt > highscores[highscores.length - 1].score;
    }

    async function showGameOver() {
        gameOverScreen.style.display = 'block';
        let scoreInt = Math.floor(state.score);
        
        // Antes de mostrar os resultados, tentamos recarregar para garantir os mais recentes
        document.getElementById('highscore-list').innerHTML = '<li>A carregar recordes...</li>';
        
        try {
            const res = await fetch(BIN_URL);
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        } catch(e) {}

        if (checkHighscore(scoreInt)) {
            document.getElementById('highscore-input').style.display = 'block';
            document.getElementById('highscore-table').style.display = 'none';
            document.getElementById('btn-restart').style.display = 'none';
            document.getElementById('playerName').focus();
        } else {
            document.getElementById('highscore-input').style.display = 'none';
            renderHighscores();
            document.getElementById('highscore-table').style.display = 'block';
            document.getElementById('btn-restart').style.display = 'inline-block';
        }
    }

    async function saveHighscore() {
        let name = document.getElementById('playerName').value.trim();
        if(!name) name = 'Anónimo';
        let scoreInt = Math.floor(state.score);
        
        // Bloquear botão para evitar múltiplos cliques
        const btn = document.querySelector('#highscore-input button');
        btn.disabled = true;
        btn.innerText = "A GUARDAR...";

        // Recarregar antes de salvar para evitar reescrever progresso de outros
        try {
            const res = await fetch(BIN_URL);
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        } catch(e) {}
        
        highscores.push({ name: name, score: scoreInt });
        highscores.sort((a, b) => b.score - a.score);
        if (highscores.length > 5) highscores = highscores.slice(0, 5);
        
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify(highscores)
            });
        } catch(e) { console.error("Erro a salvar:", e); }
        
        btn.disabled = false;
        btn.innerText = "GUARDAR";

        document.getElementById('highscore-input').style.display = 'none';
        renderHighscores();
        document.getElementById('highscore-table').style.display = 'block';
        document.getElementById('btn-restart').style.display = 'inline-block';
    }

    function renderHighscores() {
        let list = document.getElementById('highscore-list');
        list.innerHTML = '';
        if (highscores.length === 0) {
            list.innerHTML = '<li>Ainda sem recordes.</li>';
            return;
        }
        highscores.forEach(entry => {
            list.innerHTML += `<li><strong>${entry.name}</strong>: ${entry.score.toString().padStart(5, '0')}</li>`;
        });
    }

    // Criar detalhes do chão (textura) e nuvens
    function initDecoration() {
        for(let i=0; i<15; i++) {
            let d = document.createElement('div');
            d.className = 'ground-detail';
            d.style.left = Math.random() * container.offsetWidth + 'px';
            d.style.bottom = (10 + Math.random() * 10) + 'px';
            container.appendChild(d);
        }
        for(let i=0; i<3; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.left = (200 + i * 300) + 'px';
            c.style.top = (30 + Math.random() * 40) + 'px';
            container.appendChild(c);
        }
    }

    function spawn() {
        if (state.gameOver) return;

        // Decisão aleatória: 1 garrafa, 2 juntas ou 3 juntas
        let group = Math.random() > 0.8 ? (Math.random() > 0.5 ? 3 : 2) : 1;
        
        for(let i=0; i<group; i++) {
            const b = document.createElement('div');
            b.className = 'bottle';
            b.style.left = (container.offsetWidth + 50 + (i * 15)) + 'px';
            b.innerHTML = '<div class="b-neck"></div><div class="b-body"></div>';
            container.appendChild(b);
            state.obstacles.push(b);
        }

        let baseInterval = 80 / (state.speed / 6);
        state.spawnTimer = baseInterval + Math.random() * 100;
    }

    function update() {
        if (state.gameOver) return;

        // Salto
        state.velocityY += state.gravity;
        let bottom = parseFloat(player.style.bottom || 22);
        let nextBottom = bottom - state.velocityY;

        if (nextBottom <= 22) {
            nextBottom = 22;
            state.velocityY = 0;
            state.isJumping = false;
        }
        player.style.bottom = nextBottom + 'px';

        // Spawn Aleatório
        state.spawnTimer--;
        if (state.spawnTimer <= 0) spawn();

        // Movimento e Colisão
        for (let i = state.obstacles.length - 1; i >= 0; i--) {
            let b = state.obstacles[i];
            let x = parseFloat(b.style.left);
            x -= state.speed;
            b.style.left = x + 'px';

            let pRect = player.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();

            // Colisão Generosa
            if (pRect.right - 10 > bRect.left && 
                pRect.left + 10 < bRect.right && 
                pRect.bottom > bRect.top + 5) {
                state.gameOver = true;
                showGameOver();
            }

            if (x < -50) {
                b.remove();
                state.obstacles.splice(i, 1);
            }
        }

        // Pontuação e Dificuldade (aumenta gradualmente a velocidade)
        state.score += 0.15;
        state.speed += 0.0015; /* Aumenta mais rapidamente para compensar início lento */
        scoreElement.innerText = Math.floor(state.score).toString().padStart(5, '0');

        requestAnimationFrame(update);
    }

    function restart() {
        state.gameOver = false;
        state.score = 0;
        state.speed = 4.5;
        state.velocityY = 0;
        state.spawnTimer = 50;
        gameOverScreen.style.display = 'none';
        state.obstacles.forEach(b => b.remove());
        state.obstacles = [];
        update();
    }

    function jump() {
        if (!state.isJumping && !state.gameOver) {
            state.velocityY = state.jumpPower;
            state.isJumping = true;
        }
    }

    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            jump(); 
        }
    });
    
    document.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
            e.preventDefault(); 
            jump(); 
        }
    }, {passive: false});
    
    initDecoration();
    // O jogo apenas arranca no final do initGame()
</script>
</body>
</html>
