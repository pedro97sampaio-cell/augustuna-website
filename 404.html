<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro 404 - Farricoco Runner | Augustuna</title>
    <link rel="icon" type="image/x-icon" href="Logo oficial 2.png">
    <style>
        body {
            margin: 0;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #535353;
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #535353;
            border: 2px solid #535353;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 3000;
        }
        .btn-back:hover {
            background-color: #535353;
            color: #f7f7f7;
        }

        /* LOADING SCREEN (Minimalista) */
        #game-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f7f7f7;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 0.5s ease;
        }
        .loader-title {
            border: 4px solid #535353; padding: 10px 30px;
            font-size: 40px; font-weight: bold; color: #535353;
            letter-spacing: 2px; margin-bottom: 30px;
        }
        .loader-subtitle {
            font-size: 14px; color: #888; margin-bottom: 20px;
        }
        .loader-bar {
            width: 250px; height: 6px; border: 1px solid #535353; padding: 2px;
        }
        .loader-fill {
            background: #535353; height: 100%; width: 0%;
            animation: loadAnim 2s ease forwards;
        }
        @keyframes loadAnim { 0% {width: 0%;} 100% {width: 100%;} }

        /* CHARACTER SELECTION */
        #char-selection {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f0f0; display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1500; text-align: center; padding: 20px;
        }
        .char-options {
            display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center;
        }
        .char-card {
            border: 2px solid #535353; background: #fff; padding: 20px; cursor: pointer;
            width: 120px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.2s;
        }
        .char-card:hover { transform: translateY(-5px); background: #e8e8e8; }
        .char-preview {
            width: 40px; height: 60px; margin: 0 auto 15px auto; position: relative;
        }

        /* GAME BORDERS */
        #game-container {
            position: relative; width: 100%; max-width: 800px; height: 250px;
            background-color: #f7f7f7; overflow: hidden; user-select: none;
        }

        /* DECORATION */
        #ground {
            position: absolute; bottom: 20px; width: 200%; height: 2px; background-color: #535353; z-index: 3;
        }
        .ground-detail { position: absolute; background-color: #535353; height: 1px; width: 4px; bottom: 15px; opacity: 0.5; }
        .cloud { position: absolute; background: #d3d3d3; height: 12px; width: 40px; border-radius: 6px; z-index: 1; opacity: 0.6; }

        /* PLAYER GHOST BASE */
        .player-ghost {
            position: absolute; bottom: 22px; width: 36px; height: 50px; z-index: 10;
        }
        .hood {
            width: 100%; height: 100%; background: #111; border-radius: 18px 18px 0 0; position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 87.5% 100%, 75% 85%, 62.5% 100%, 50% 85%, 37.5% 100%, 25% 85%, 12.5% 100%, 0% 85%);
        }
        .face {
            position: absolute; top: 22px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        .eyes { display: flex; gap: 4px; }
        .eye { width: 6px; height: 8px; background: white; border-radius: 50%; }
        .blush { display: flex; gap: 14px; margin-top: -1px; }
        .dot { width: 5px; height: 3px; background: #999; border-radius: 50%; }

        /* TYPE: SEMINOIDE (Rope) */
        .char-seminoide .rope { position: absolute; top: 15px; left: 0; width: 100%; height: 3px; background: #A0522D; z-index: 12; }
        .char-seminoide .rope-knot { position: absolute; top: 13px; right: -2px; width: 7px; height: 7px; background: #8B4513; border-radius: 50%; z-index: 12; }
        .char-seminoide .rope-tail { position: absolute; top: 18px; right: -4px; width: 3px; height: 10px; background: #A0522D; transform: rotate(20deg); z-index: 11; }

        /* TYPE: SEMINA (Blue Ghost) */
        .char-semina .hood { background: #007bff; } /* Azul */

        /* TYPE: TUNO (Plain Black Ghost) */
        .char-tuno .hood { background: #111; }

        /* IMMUNITY EFFECT */
        .immune-flash { animation: flash 0.3s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.3; filter: brightness(2); } 100% { opacity: 1; } }

        /* BOTTLE OBSTACLE */
        .bottle { position: absolute; bottom: 22px; width: 12px; height: 35px; z-index: 5; }
        .b-body { position: absolute; bottom: 0; width: 12px; height: 22px; background: #535353; border-radius: 2px 2px 0 0; }
        .b-neck { position: absolute; bottom: 22px; left: 4px; width: 4px; height: 13px; background: #535353; }

        /* LAUREL (POWER-UP) */
        .laurel {
            position: absolute; bottom: 40px; width: 20px; height: 20px;
            border: 3px solid #2e8b57; border-radius: 50%; z-index: 6;
            box-shadow: 0 0 8px rgba(46,139,87,0.8); background: rgba(46,139,87,0.2);
            animation: laurelBob 1s infinite alternate ease-in-out;
        }
        @keyframes laurelBob { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* UI */
        #score { position: absolute; top: 10px; right: 20px; font-size: 20px; font-weight: bold; }
        .instructions { margin-top: 30px; text-align: center; font-size: 14px; color: #888; }
        
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100;
        }
        button { background: none; border: 2px solid #535353; color: #535353; padding: 8px 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #535353; color: #f7f7f7; }

        /* Leaderboard table */
        #highscore-input { display: none; margin: 15px 0; }
        #highscore-table { margin: 15px 0; text-align: left; font-size: 14px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 5px; }
        #highscore-list { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>

    <!-- Audio Player via Tag (Hidden) -->
    <audio id="bg-music" loop>
        <source src="braga boemia 8bit.mp4" type="audio/mp4">
    </audio>

    <a href="index.html" class="btn-back">&larr; Voltar ao Ritmo</a>

    <!-- LOADING SCREEN -->
    <div id="game-loader">
        <div class="loader-title">AUGUSTUNA</div>
        <div class="loader-subtitle">rumo à Bracara augusta...</div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <!-- CHARACTER SELECTION -->
    <div id="char-selection">
        <h2>ESCOLHE A TUA PERSONAGEM</h2>
        <div class="char-options">
            
            <div class="char-card" onclick="startGame('char-seminoide')">
                <div class="char-preview player-ghost char-seminoide" style="position:static;">
                    <div class="hood"></div>
                    <div class="rope"></div><div class="rope-knot"></div><div class="rope-tail"></div>
                    <div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div>
                </div>
                <strong>Seminóide</strong>
            </div>

            <div class="char-card" onclick="startGame('char-semina')">
                <div class="char-preview player-ghost char-semina" style="position:static;">
                    <div class="hood"></div>
                    <div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="blush"><div class="dot"></div><div class="dot"></div></div></div>
                </div>
                <strong>Semina</strong>
            </div>

            <div class="char-card" onclick="startGame('char-tuno')">
                <div class="char-preview player-ghost char-tuno" style="position:static;">
                    <div class="hood"></div>
                    <div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div>
                </div>
                <strong>Tuno</strong>
            </div>

        </div>
    </div>

    <div id="game-container">
        <div id="score">00000</div>
        <div id="ground"></div>
        <div id="player" class="player-ghost char-seminoide">
            <!-- Dynamically injected based on selection -->
        </div>
        <div id="game-over">
            <h1 style="letter-spacing: 5px; margin-bottom: 5px;">G A M E  O V E R</h1>
            
            <div id="highscore-input">
                <p style="margin: 0 0 5px 0; color: #C9A84C; font-weight: bold;">NOVO RECORDE!</p>
                <input type="text" id="playerName" placeholder="O teu nome..." maxlength="10" style="padding: 5px; text-align: center; border: 2px solid #535353; font-family: inherit; width: 150px;">
                <br>
                <button onclick="saveHighscore()">GUARDAR</button>
            </div>

            <div id="highscore-table">
                <h3 style="margin: 0 0 10px 0; text-align: center;">TOP 5 ENSAIO</h3>
                <ol id="highscore-list"></ol>
            </div>

            <button id="btn-restart" onclick="restart()">REINICIAR ENSAIO</button>
        </div>
    </div>
    
    <div class="instructions">
        Pressiona <strong>ESPAÇO</strong> ou <strong>TOCA NO ECRÃ</strong> para saltar.<br>
        Apanha a <strong>Coroa de Louros</strong> para imunidade!
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over');
    const ground = document.getElementById('ground');
    let bgMusic = document.getElementById('bg-music');

    bgMusic.volume = 0.5;

    let state = {
        gameOver: true,
        score: 0,
        speed: 3.5, // Start very slow
        gravity: 0.6,
        jumpPower: -12,
        velocityY: 0,
        isJumping: false,
        obstacles: [],
        laurels: [],
        spawnTimer: 0,
        immuneTime: 0
    };

    let highscores = [];
    const BIN_URL = "https://jsonblob.com/api/jsonBlob/019d2cc6-daf7-7df0-9801-03e71948ba95";

    async function initGame() {
        // Load global highscores and wait for loading animation
        const [res] = await Promise.all([
            fetch(BIN_URL).catch(()=>null),
            new Promise(r => setTimeout(r, 2200)) // 2 seconds minimum for the progress bar
        ]);

        if(res && res.ok) {
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        }

        // Hide loader, show character selection
        document.getElementById('game-loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('game-loader').style.display = 'none';
            document.getElementById('char-selection').style.display = 'flex';
        }, 500);
    }

    function startGame(charClass) {
        document.getElementById('char-selection').style.display = 'none';
        
        // Setup player HTML based on selection
        player.className = `player-ghost ${charClass}`;
        let innerHTML = `<div class="hood"></div>`;
        if (charClass === 'char-seminoide') {
            innerHTML += `<div class="rope"></div><div class="rope-knot"></div><div class="rope-tail"></div><div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div>`;
        } else if (charClass === 'char-semina') {
            innerHTML += `<div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="blush"><div class="dot"></div><div class="dot"></div></div></div>`;
        } else if (charClass === 'char-tuno') {
            innerHTML += `<div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div>`;
        }
        player.innerHTML = innerHTML;

        // Try playing music (Requires user interaction, which just happened!)
        bgMusic.play().catch(e => console.log("Áudio não encontrado ou bloqueado."));

        state.gameOver = false;
        requestAnimationFrame(update);
    }

    initGame();

    function checkHighscore(finalScore) {
        let scoreInt = Math.floor(finalScore);
        if (scoreInt <= 0) return false;
        if (highscores.length < 5) return true;
        return scoreInt > highscores[highscores.length - 1].score;
    }

    async function showGameOver() {
        state.gameOver = true;
        gameOverScreen.style.display = 'block';
        player.classList.remove('immune-flash'); // reset visual loop
        
        document.getElementById('highscore-list').innerHTML = '<li>A carregar recordes...</li>';
        
        try {
            const res = await fetch(BIN_URL);
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        } catch(e) {}

        let scoreInt = Math.floor(state.score);
        if (checkHighscore(scoreInt)) {
            document.getElementById('highscore-input').style.display = 'block';
            document.getElementById('highscore-table').style.display = 'none';
            document.getElementById('btn-restart').style.display = 'none';
            document.getElementById('playerName').focus();
        } else {
            document.getElementById('highscore-input').style.display = 'none';
            renderHighscores();
            document.getElementById('highscore-table').style.display = 'block';
            document.getElementById('btn-restart').style.display = 'inline-block';
        }
    }

    async function saveHighscore() {
        let name = document.getElementById('playerName').value.trim();
        if(!name) name = 'Anónimo';
        let scoreInt = Math.floor(state.score);
        
        const btn = document.querySelector('#highscore-input button');
        btn.disabled = true;
        btn.innerText = "A GUARDAR...";

        try {
            const res = await fetch(BIN_URL);
            const data = await res.json();
            highscores = Array.isArray(data) ? data : [];
        } catch(e) {}
        
        highscores.push({ name: name, score: scoreInt });
        highscores.sort((a, b) => b.score - a.score);
        if (highscores.length > 5) highscores = highscores.slice(0, 5);
        
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify(highscores)
            });
        } catch(e) { console.error("Erro a salvar:", e); }
        
        btn.disabled = false;
        btn.innerText = "GUARDAR";

        document.getElementById('highscore-input').style.display = 'none';
        renderHighscores();
        document.getElementById('highscore-table').style.display = 'block';
        document.getElementById('btn-restart').style.display = 'inline-block';
    }

    function renderHighscores() {
        let list = document.getElementById('highscore-list');
        list.innerHTML = '';
        if (highscores.length === 0) {
            list.innerHTML = '<li>Ainda sem recordes.</li>';
            return;
        }
        highscores.forEach(entry => {
            list.innerHTML += `<li><strong>${entry.name}</strong>: ${entry.score.toString().padStart(5, '0')}</li>`;
        });
    }

    function initDecoration() {
        for(let i=0; i<15; i++) {
            let d = document.createElement('div');
            d.className = 'ground-detail';
            d.style.left = Math.random() * 2000 + 'px';
            d.style.bottom = (10 + Math.random() * 10) + 'px';
            container.appendChild(d);
        }
        for(let i=0; i<3; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.left = (200 + i * 300) + 'px';
            c.style.top = (30 + Math.random() * 40) + 'px';
            container.appendChild(c);
        }
    }

    function spawn() {
        if (state.gameOver) return;

        // Laurel wreath random chance (very rare, 10% when spawning)
        if (Math.random() > 0.90) {
            const laurel = document.createElement('div');
            laurel.className = 'laurel';
            // Spawn higher up so they have to jump for it
            laurel.style.left = (container.offsetWidth + 50) + 'px';
            laurel.style.bottom = (50 + Math.random() * 50) + 'px'; 
            container.appendChild(laurel);
            state.laurels.push(laurel);
        } else {
            // Normal Bottles
            let group = Math.random() > 0.8 ? (Math.random() > 0.5 ? 3 : 2) : 1;
            for(let i=0; i<group; i++) {
                const b = document.createElement('div');
                b.className = 'bottle';
                b.style.left = (container.offsetWidth + 50 + (i * 15)) + 'px';
                b.innerHTML = '<div class="b-neck"></div><div class="b-body"></div>';
                container.appendChild(b);
                state.obstacles.push(b);
            }
        }

        let baseInterval = 80 / (state.speed / 5);
        state.spawnTimer = baseInterval + Math.random() * 100;
    }

    function update() {
        if (state.gameOver) return;

        // Timer de Imunidade
        if (state.immuneTime > 0) {
            state.immuneTime--;
            player.classList.add('immune-flash');
        } else {
            player.classList.remove('immune-flash');
        }

        state.velocityY += state.gravity;
        let bottom = parseFloat(player.style.bottom || 22);
        let nextBottom = bottom - state.velocityY;

        if (nextBottom <= 22) {
            nextBottom = 22;
            state.velocityY = 0;
            state.isJumping = false;
        }
        player.style.bottom = nextBottom + 'px';

        state.spawnTimer--;
        if (state.spawnTimer <= 0) spawn();

        let pRect = player.getBoundingClientRect();

        // Move Laurels
        for (let i = state.laurels.length - 1; i >= 0; i--) {
            let L = state.laurels[i];
            let x = parseFloat(L.style.left);
            x -= state.speed;
            L.style.left = x + 'px';
            
            let lRect = L.getBoundingClientRect();
            if (pRect.right > lRect.left && pRect.left < lRect.right && pRect.bottom > lRect.top && pRect.top < lRect.bottom) {
                // Collect Laurel! Immune for 5 seconds (~300 frames)
                state.immuneTime = 300;
                L.remove();
                state.laurels.splice(i, 1);
            } else if (x < -50) {
                L.remove();
                state.laurels.splice(i, 1);
            }
        }

        // Move Obstacles
        for (let i = state.obstacles.length - 1; i >= 0; i--) {
            let b = state.obstacles[i];
            let x = parseFloat(b.style.left);
            x -= state.speed;
            b.style.left = x + 'px';

            let bRect = b.getBoundingClientRect();

            if (pRect.right - 10 > bRect.left && 
                pRect.left + 10 < bRect.right && 
                pRect.bottom > bRect.top + 5) {
                
                if (state.immuneTime <= 0) {
                    showGameOver();
                } else {
                    // Destroy bottle if immune
                    b.remove();
                    state.obstacles.splice(i, 1);
                }
            }

            if (x < -50) {
                if (document.body.contains(b)) b.remove();
                if(state.obstacles[i]) state.obstacles.splice(i, 1);
            }
        }

        if(!state.gameOver) {
            state.score += 0.15;
            state.speed += 0.002; // acceleration
            scoreElement.innerText = Math.floor(state.score).toString().padStart(5, '0');
            requestAnimationFrame(update);
        }
    }

    function restart() {
        state.gameOver = false;
        state.score = 0;
        state.speed = 3.5; // Starts quite slow
        state.velocityY = 0;
        state.spawnTimer = 50;
        state.immuneTime = 0;
        player.classList.remove('immune-flash');
        
        gameOverScreen.style.display = 'none';
        state.obstacles.forEach(b => b.remove());
        state.laurels.forEach(L => L.remove());
        state.obstacles = [];
        state.laurels = [];
        update();
    }

    function jump() {
        if (!state.isJumping && !state.gameOver) {
            state.velocityY = state.jumpPower;
            state.isJumping = true;
        }
    }

    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            jump(); 
        }
    });
    
    document.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && !e.target.closest('.char-card')) {
            e.preventDefault(); 
            jump(); 
        }
    }, {passive: false});
    
    initDecoration();
</script>
</body>
</html>
