<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farricoco Runner - Estilo Chrome</title>
    <style>
        body {
            margin: 0;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #535353;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 200px; /* Mais baixo como o original */
            background-color: #f7f7f7;
            overflow: hidden;
            user-select: none;
        }

        /* CHÃO COM TEXTURA PIXEL */
        #ground {
            position: absolute;
            bottom: 20px;
            width: 200%;
            height: 2px;
            background-color: #535353;
            z-index: 3;
        }
        .ground-detail {
            position: absolute;
            background-color: #535353;
            height: 1px;
            width: 4px;
            bottom: 15px;
            opacity: 0.5;
        }

        /* NUVENS MINIMALISTAS */
        .cloud {
            position: absolute;
            background: #d3d3d3;
            height: 12px;
            width: 40px;
            border-radius: 6px;
            z-index: 1;
            opacity: 0.6;
        }

        /* FARRICOCO (DESIGN ARREDONDADO) */
        #player {
            position: absolute;
            bottom: 22px;
            left: 100px;
            width: 36px;
            height: 55px;
            z-index: 10;
        }
        .hood {
            width: 100%;
            height: 100%;
            background: #535353;
            clip-path: ellipse(45% 90% at 50% 100%);
        }
        .face {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .eyes { display: flex; gap: 4px; }
        .eye { width: 6px; height: 8px; background: white; border-radius: 50%; }
        .blush { display: flex; gap: 14px; margin-top: -1px; }
        .dot { width: 5px; height: 3px; background: #999; border-radius: 50%; }

        /* GARRAFA DE CERVEJA (OBSTÁCULO) */
        .bottle {
            position: absolute;
            bottom: 22px;
            width: 12px;
            height: 35px;
            z-index: 5;
        }
        .b-body {
            position: absolute;
            bottom: 0;
            width: 12px;
            height: 22px;
            background: #535353;
            border-radius: 2px 2px 0 0;
        }
        .b-neck {
            position: absolute;
            bottom: 22px;
            left: 4px;
            width: 4px;
            height: 13px;
            background: #535353;
        }

        /* UI */
        #score {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        button {
            background: none;
            border: 2px solid #535353;
            color: #535353;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">00000</div>
        <div id="ground"></div>
        <div id="player">
            <div class="hood"></div>
            <div class="face">
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="blush"><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>
        <div id="game-over">
            <h1 style="letter-spacing: 5px;">G A M E  O V E R</h1>
            <button onclick="restart()">RESTART</button>
        </div>
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over');
    const ground = document.getElementById('ground');

    let state = {
        gameOver: false,
        score: 0,
        speed: 6,
        gravity: 0.6,
        jumpPower: -12,
        velocityY: 0,
        isJumping: false,
        obstacles: [],
        spawnTimer: 0
    };

    // Criar detalhes do chão (textura) e nuvens
    function initDecoration() {
        for(let i=0; i<15; i++) {
            let d = document.createElement('div');
            d.className = 'ground-detail';
            d.style.left = Math.random() * 800 + 'px';
            d.style.bottom = (10 + Math.random() * 10) + 'px';
            container.appendChild(d);
        }
        for(let i=0; i<3; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.left = (200 + i * 300) + 'px';
            c.style.top = (30 + Math.random() * 40) + 'px';
            container.appendChild(c);
        }
    }

    function spawn() {
        if (state.gameOver) return;

        // Decisão aleatória: 1 garrafa, 2 juntas ou 3 juntas
        let group = Math.random() > 0.8 ? (Math.random() > 0.5 ? 3 : 2) : 1;
        
        for(let i=0; i<group; i++) {
            const b = document.createElement('div');
            b.className = 'bottle';
            b.style.left = (850 + (i * 15)) + 'px';
            b.innerHTML = '<div class="b-neck"></div><div class="b-body"></div>';
            container.appendChild(b);
            state.obstacles.push(b);
        }

        // Aleatoriedade da distância: Base fixa + um valor random grande
        // O intervalo diminui conforme a velocidade aumenta para manter o desafio
        let baseInterval = 80 / (state.speed / 6);
        state.spawnTimer = baseInterval + Math.random() * 100;
    }

    function update() {
        if (state.gameOver) return;

        // Salto
        state.velocityY += state.gravity;
        let bottom = parseFloat(player.style.bottom || 22);
        let nextBottom = bottom - state.velocityY;

        if (nextBottom <= 22) {
            nextBottom = 22;
            state.velocityY = 0;
            state.isJumping = false;
        }
        player.style.bottom = nextBottom + 'px';

        // Spawn Aleatório
        state.spawnTimer--;
        if (state.spawnTimer <= 0) spawn();

        // Movimento e Colisão
        for (let i = state.obstacles.length - 1; i >= 0; i--) {
            let b = state.obstacles[i];
            let x = parseFloat(b.style.left);
            x -= state.speed;
            b.style.left = x + 'px';

            let pRect = player.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();

            // Colisão (ajustada para ser generosa como no Chrome)
            if (pRect.right - 10 > bRect.left && 
                pRect.left + 10 < bRect.right && 
                pRect.bottom > bRect.top + 5) {
                state.gameOver = true;
                gameOverScreen.style.display = 'block';
            }

            if (x < -50) {
                b.remove();
                state.obstacles.splice(i, 1);
            }
        }

        // Pontuação e Dificuldade
        state.score += 0.15;
        state.speed += 0.001;
        scoreElement.innerText = Math.floor(state.score).toString().padStart(5, '0');

        requestAnimationFrame(update);
    }

    function restart() {
        state.gameOver = false;
        state.score = 0;
        state.speed = 6;
        state.velocityY = 0;
        state.spawnTimer = 50;
        gameOverScreen.style.display = 'none';
        state.obstacles.forEach(b => b.remove());
        state.obstacles = [];
        update();
    }

    function jump() {
        if (!state.isJumping && !state.gameOver) {
            state.velocityY = state.jumpPower;
            state.isJumping = true;
        }
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
    container.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    
    initDecoration();
    update();
</script>
</body>
</html>
